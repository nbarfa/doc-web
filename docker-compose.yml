version: '3.8'

services:
  web:
    image: nitin260/doc-web:latest
    container_name: doc-web
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: doc-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nitin123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: