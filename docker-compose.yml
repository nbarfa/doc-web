services:
  web:
    image: nitin260/doc-web:latest
    ports:
      - 8000:8000
    depends_on:
      - db
  
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nitin123
      POSTGRES_DB: mydb
    ports:
      - 5432:5432
    
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

